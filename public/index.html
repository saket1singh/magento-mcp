<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magento Chatbot</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-button" id="chatButton">
            <svg viewBox="0 0 24 24" width="24" height="24">
                <path fill="currentColor" d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/>
            </svg>
        </div>
        
        <div class="chat-window" id="chatWindow">
            <div class="chat-header">
                <h3>Magento Chatbot</h3>
                <button class="close-button" id="closeButton">×</button>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="message bot">
                    <p>Hello! I can help you with product information. Here are some quick actions:</p>
                    <div class="quick-actions">
                        <button class="quick-action-btn" data-action="list">📋 List All Products</button>
                        <button class="quick-action-btn" data-action="stock">📊 Check Stock Status</button>
                        <button class="quick-action-btn" data-action="search">🔍 Search Products</button>
                        <button class="quick-action-btn" data-action="help">❓ Show Help</button>
                    </div>
                </div>
            </div>
            <div class="chat-input">
                <input type="text" id="userInput" placeholder="Type your message here...">
                <button id="sendButton">Send</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
